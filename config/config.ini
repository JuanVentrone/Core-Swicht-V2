[VOLTAGE_PROTECTION]
# Si enabled = true, se leen L1, L2 y L3 del medidor Modbus.
# Si alguna fase es < min_volts o > max_volts, se apagan C1, C2 y C3 (apagado general).
# Al arranque: si no hay lectura a tiempo o el voltaje está fuera de [min_volts, max_volts] → apagado.

enabled = true
min_volts = 218
max_volts = 253
# Segundos entre lecturas/comprobaciones (el medidor ya se actualiza por RS485).
check_interval_seconds = 2
# Máximo de espera (s) al primer dato válido del medidor al iniciar la API.
startup_read_timeout_seconds = 90

# Encendido secuencial automático (C1→C2→C3) si L1–L3 permanecen en esta ventana sin salir.
auto_start_enabled = true
auto_start_min_volts = 220
auto_start_max_volts = 245
# Tiempo continuo en la ventana de auto-arranque (ej. 180 = 3 minutos).
auto_start_stable_seconds = 180
